<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ピクたま</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== タイトル画面 ========== -->
  <div id="screen-title" class="screen">
    <div class="title-wrap">
      <h1 class="title-logo">ピクたま</h1>
      <div class="title-egg">🥚</div>
      <p class="title-sub">たまごっち風 いくせいゲーム</p>
      <div class="title-buttons">
        <button id="btn-new"   class="btn-main">はじめる</button>
        <button id="btn-load"  class="btn-main btn-blue">つづきから</button>
        <button id="btn-reset" class="btn-sub">リセット</button>
      </div>
    </div>
  </div>

  <!-- ========== メイン画面 ========== -->
  <div id="screen-main" class="screen hidden">
    <div class="game-frame">

      <!-- ブランドラベル（デバイス上部） -->
      <div class="brand-label">ピクたま</div>

      <!-- ★ 上部ボタン行：ごはん・おやつ・あそぶ・そうじ -->
      <div class="btn-row top-row">
        <button class="btn-action" onclick="doAction('feed')">
          <span class="btn-emoji">🍙</span><span class="btn-label">ごはん</span>
        </button>
        <button class="btn-action" onclick="doAction('snack')">
          <span class="btn-emoji">🍬</span><span class="btn-label">おやつ</span>
        </button>
        <button class="btn-action" onclick="doAction('play')">
          <span class="btn-emoji">🎮</span><span class="btn-label">あそぶ</span>
        </button>
        <button class="btn-action" onclick="doAction('clean')">
          <span class="btn-emoji">🚿</span><span class="btn-label">そうじ</span>
        </button>
      </div>

      <!-- ★ LCDスクリーン（キャラ ↔ じょうたい を切り替え） -->
      <div class="lcd-screen">

        <!-- キャラビュー（デフォルト） -->
        <div id="view-char" class="lcd-view">
          <div id="char-area" class="char-area">
            <canvas id="char-canvas" class="char-canvas char-normal"></canvas>
            <div id="zzz-overlay" class="zzz-overlay" style="display:none"></div>
            <div id="poop-display" class="poop-display"></div>
          </div>
        </div>

        <!-- じょうたいビュー -->
        <div id="view-status" class="lcd-view hidden">
          <div class="sv-wrap">
            <div class="sv-header">
              <span id="sv-stage">たまご</span>
              <span id="sv-age">0日0時間</span>
            </div>
            <div class="sv-bars">
              <div class="sv-row">
                <span class="sv-label">まんぷく</span>
                <div class="sv-bar-bg"><div id="sv-bar-hunger" class="sv-bar bar-orange"></div></div>
                <span id="sv-num-hunger" class="sv-num">100</span>
              </div>
              <div class="sv-row">
                <span class="sv-label">きげん</span>
                <div class="sv-bar-bg"><div id="sv-bar-mood" class="sv-bar bar-pink"></div></div>
                <span id="sv-num-mood" class="sv-num">100</span>
              </div>
              <div class="sv-row">
                <span class="sv-label">せいけつ</span>
                <div class="sv-bar-bg"><div id="sv-bar-clean" class="sv-bar bar-blue"></div></div>
                <span id="sv-num-clean" class="sv-num">100</span>
              </div>
            </div>
            <div class="sv-icons">
              <span id="sv-health"></span>
              <span id="sv-sleep"></span>
              <span id="sv-poop"></span>
            </div>
          </div>
        </div>

        <!-- メッセージ（LCD下部・常時表示） -->
        <div class="message-box">
          <p id="msg-text">ようこそ！</p>
        </div>

      </div><!-- /lcd-screen -->

      <!-- ★ 下部ボタン行：なおす・ねる・じょうたい -->
      <div class="btn-row bottom-row">
        <button class="btn-action" onclick="doAction('heal')">
          <span class="btn-emoji">💊</span><span class="btn-label">なおす</span>
        </button>
        <button class="btn-action" id="btn-sleep-wake" onclick="doAction('sleep')">
          <span class="btn-emoji">🌙</span><span class="btn-label">ねる</span>
        </button>
        <button class="btn-action btn-status-toggle" id="btn-toggle-status" onclick="toggleStatusView()">
          <span class="btn-emoji">📋</span><span class="btn-label">じょうたい</span>
        </button>
      </div>

    </div><!-- /game-frame -->
  </div>

  <!-- ========== 成長モーダル ========== -->
  <div id="modal-evo" class="modal hidden">
    <div class="modal-box">
      <canvas id="evo-canvas" class="evo-sprite-canvas"></canvas>
      <h2 id="evo-title" class="modal-title">せいちょう！</h2>
      <p id="evo-message" class="modal-message"></p>
      <button class="btn-main" onclick="closeModal('modal-evo')">やったー！</button>
    </div>
  </div>

  <!-- ========== 記録モーダル ========== -->
  <div id="modal-result" class="modal hidden">
    <div class="modal-box">
      <h2 class="modal-title">そだてきろく</h2>
      <div id="result-body"></div>
      <button class="btn-main" onclick="closeModal('modal-result')">とじる</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
